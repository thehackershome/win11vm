<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System</title>
    <script src="https://unpkg.com/v86@0.10.2/build/libv86.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            color: white; 
            /* Strict System Fonts Only - No Roboto/Helvetica/Arial */
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        #setup-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 30;
        }

        input {
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            width: 380px;
            border-radius: 2px;
            font-size: 13px;
            outline: none;
            text-align: center;
        }

        /* Centered Alignment Fix */
        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
        }

        svg {
            width: 48px;
            height: 48px;
            fill: #ffffff;
            margin-bottom: 12px;
            animation: pulse 2s ease-in-out infinite;
        }

        #status-text {
            font-size: 10px;
            font-weight: 400;
            margin-bottom: 4px;
        }

        #percentage {
            font-size: 9px;
            opacity: 0.5;
        }

        #view {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }
    </style>
</head>
<body>

<div id="setup-box">
    <input type="text" id="link-input" placeholder="PASTE MICROSOFT ISO LINK & PRESS ENTER" autofocus>
</div>

<div id="loader">
    <svg viewBox="0 0 24 24">
        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
    </svg>
    <div id="status-text">Starting VM...</div>
    <div id="percentage">0%</div>
</div>

<div id="view"></div>

<script>
    const input = document.getElementById('link-input');
    const setupBox = document.getElementById('setup-box');
    const loader = document.getElementById('loader');
    const view = document.getElementById('view');
    const percentEl = document.getElementById('percentage');

    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && this.value.trim() !== "") {
            startVM(this.value.trim());
        }
    });

    function startVM(isoUrl) {
        setupBox.style.display = 'none';
        loader.style.display = 'flex';
        view.style.display = 'block';

        // Bridge to allow the browser to see the Microsoft CDN stream
        const proxiedUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(isoUrl);

        const instance = new V86Starter({
            wasm_path: "https://unpkg.com/v86@0.10.2/build/v86.wasm",
            memory_size: 4096 * 1024 * 1024, 
            vga_memory_size: 256 * 1024 * 1024,
            screen_container: view,
            bios: { url: "https://unpkg.com/v86@0.10.2/bios/seabios.bin" },
            vga_bios: { url: "https://unpkg.com/v86@0.10.2/bios/vgabios.bin" },
            cdrom: { url: proxiedUrl, async: true },
            // Virtual Memory (IndexedDB)
            hda: { size: 64 * 1024 * 1024 * 1024, async: true },
            autostart: true,
            fastboot: true,
            async_vga: true
        });

        // FORCE LOADING RECOGNITION
        // This listener ensures the UI reacts to every byte sent from the proxy
        instance.add_listener("download-progress", function(e) {
            if (e.total) {
                let p = Math.round((e.loaded / e.total) * 100);
                percentEl.innerText = p + "%";
            } else {
                // If the proxy strips the 'total-size' header, show the actual data volume
                // This proves the system is loading and NOT stuck.
                percentEl.innerText = (e.loaded / (1024 * 1024)).toFixed(1) + " MB Buffered";
            }
        });

        let modeChanges = 0;
        instance.add_listener("screen-set-mode", function() {
            modeChanges++;
            if (modeChanges >= 2) {
                loader.style.display = 'none';
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
            }
        });
    }
</script>

</body>
</html>
