<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System</title>
    <script src="https://unpkg.com/v86@0.10.2/build/libv86.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            color: white; 
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        #setup-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 30;
        }

        .file-upload {
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 14px 24px;
            border-radius: 2px;
            font-size: 13px;
            cursor: pointer;
            transition: border 0.3s;
        }

        .file-upload:hover { border-color: #0078d4; }
        input[type="file"] { display: none; }

        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
        }

        svg {
            width: 48px;
            height: 48px;
            fill: #ffffff;
            margin-bottom: 12px;
            animation: pulse 2s ease-in-out infinite;
        }

        #status-text {
            font-size: 10px;
            font-weight: 400;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #percentage {
            font-size: 10px;
            opacity: 0.6;
        }

        #view {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }
    </style>
</head>
<body>

<div id="setup-box">
    <label class="file-upload">
        <input type="file" id="iso-selector" accept=".iso">
        CHOOSE WINDOWS 11 ISO TO BOOT
    </label>
</div>

<div id="loader">
    <svg viewBox="0 0 24 24">
        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
    </svg>
    <div id="status-text">Starting VM...</div>
    <div id="percentage">Reading Disk Sectors...</div>
</div>

<div id="view"></div>

<script>
    const isoSelector = document.getElementById('iso-selector');
    const setupBox = document.getElementById('setup-box');
    const loader = document.getElementById('loader');
    const view = document.getElementById('view');
    const statusText = document.getElementById('status-text');
    const percentEl = document.getElementById('percentage');

    isoSelector.addEventListener('change', function (e) {
        if (e.target.files.length > 0) {
            startVM(e.target.files[0]);
        }
    });

    function startVM(fileBlob) {
        setupBox.style.display = 'none';
        loader.style.display = 'flex';
        view.style.display = 'block';
        
        statusText.innerText = "Initializing 16GB Hardware Context...";

        const instance = new V86Starter({
            wasm_path: "https://unpkg.com/v86@0.10.2/build/v86.wasm",
            
            // FORCED MEMORY PROFILE: 16GB Virtual Memory
            memory_size: 16384 * 1024 * 1024, 
            vga_memory_size: 512 * 1024 * 1024,
            
            screen_container: view,
            bios: { url: "https://unpkg.com/v86@0.10.2/bios/seabios.bin" },
            vga_bios: { url: "https://unpkg.com/v86@0.10.2/bios/vgabios.bin" },
            
            // Native sector-by-sector access to the file completely avoiding network CORS
            cdrom: { file: fileBlob, async: true },
            
            // IndexedDB Virtual Memory storage backup
            hda: { size: 64 * 1024 * 1024 * 1024, async: true },
            
            autostart: true,
            fastboot: true,
            async_vga: true
        });

        instance.add_listener("download-progress", function(e) {
            statusText.innerText = "Processing System Instruction Blocks...";
            if (e.total) {
                percentEl.innerText = Math.round((e.loaded / e.total) * 100) + "%";
            } else {
                percentEl.innerText = (e.loaded / (1024 * 1024)).toFixed(1) + " MB Indexed";
            }
        });

        let modeChanges = 0;
        instance.add_listener("screen-set-mode", function() {
            modeChanges++;
            if (modeChanges >= 2) {
                loader.style.display = 'none';
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
            }
        });
    }
</script>

</body>
</html>
